<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Blog | Simple Blog</title>
</head>
<body>

    <header>
        <nav>
            <h2>Simple Blog</h2>

            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="add-blog.html">Add Blog</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <section>
            <h1>Add New Blog</h1>

            <form>

                <label for="title">Blog Title</label><br>
                <input type="text" id="title" placeholder="Enter blog title"><br><br>

                <label for="author">Author Name</label><br>
                <input type="text" id="author" placeholder="Enter author name"><br><br>

                <label for="content">Blog Content</label><br>
                <textarea id="content" rows="8" cols="50" placeholder="Write your blog here..."></textarea><br><br>

                <button type="submit">Add Blog</button>

            </form>

        </section>

    </main>

    <footer>
        <p>&copy; 2026 Simple Blog Management System | Codomax Internship</p>
    </footer>

</body>
</html>
